    <style>
        html, body { background-color: #333; margin: 0; padding: 0; }
        
        body { 
            position: relative; 
            width: 100vw; 
            /* height: 100vh/100dvh는 삭제하고 JS에서 동적으로 정확하게 제어합니다 */

            position: absolute; 
            width: 393px;

            background-color: #FFFDF5;

        #main-canvas { width: 100%; height: 100%; }

            position: absolute; top: 0; left: 0; width: 100%; height: 100%;

            z-index: 3000; display: none;

            position: absolute; top: 50%; left: 50%; width: 348px; 
            background: #FFF; border-radius: 22px; padding: 32px 24px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            box-sizing: border-box; transform: translate(-50%, calc(-50% + 30px));

        #result-screen.show .result-card { transform: translate(-50%, -50%); opacity: 1; }

        .res-total-value { 
            display: flex; align-items: baseline; justify-content: center;

        }
        #res-rate-num { font-size: 46px; }
        #res-rate-percent { font-size: 40px; margin-left: 2px; }

        .result-buttons { 
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; width: 348px; box-sizing: border-box;
        }
        .btn-res { height: 64px; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; }
        #btn-go-main { width: 132px; background: #2D2D2D; color: #FFF; } 
        #btn-retry { width: 206px; background: #F68679; color: #FFF; } 

        #ingame-ui { display: none; }
        #btn-close-wrap { position: absolute; top: 16px; left: 4px; width: 44px; height: 44px; z-index: 1001; cursor: pointer; }
        #btn-close-wrap img { width: 100%; height: 100%; display: block; object-fit: contain; }
        .header-ui-container { position: absolute; top: 75px; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; z-index: 1000; pointer-events: none; }

    <canvas id="dynamic-layer-canvas" style="position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none;"></canvas>

    <div id="result-screen">
        <div class="result-card">
            <div class="res-title">챌린지 결과</div>
            <div class="res-info-row">

                <div class="res-info-label"><img src="clover_s.png" alt="clover"> 클로버 획득</div>

    <div id="canvas-container"><canvas id="canvas"></canvas></div>

<script>
// ==========================================
// ★ Web Audio API 
// ==========================================
let audioCtx;

function initAudio() {
    if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    if (audioCtx.state === 'suspended') { audioCtx.resume(); }
}

function playSfxJump() {
    if (!audioCtx) return; const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(250, t); osc.frequency.exponentialRampToValueAtTime(800, t + 0.15);
    gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(0.045, t + 0.02); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15); osc.start(t); osc.stop(t + 0.15);
}

function playSfxClover() {
    if (!audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'triangle'; osc.frequency.setValueAtTime(880, audioCtx.currentTime); osc.frequency.setValueAtTime(1108.73, audioCtx.currentTime + 0.05); 
    gain.gain.setValueAtTime(0.07, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15); osc.start(); osc.stop(audioCtx.currentTime + 0.15);
}

function playSfxSuperJump() {
    if (!audioCtx) return; const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(400, t); osc.frequency.exponentialRampToValueAtTime(1500, t + 0.4);
    gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(0.07, t + 0.05); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5); osc.start(t); osc.stop(t + 0.5);
}

function playSfxHit() {
    if (!audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.07, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2); osc.start(); osc.stop(audioCtx.currentTime + 0.2);
}

function playSfxBreak() {
    if (!audioCtx) return; const t = audioCtx.currentTime; const bufferSize = audioCtx.sampleRate * 0.15; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
    const noise = audioCtx.createBufferSource(); noise.buffer = buffer; const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.setValueAtTime(1500, t); filter.frequency.exponentialRampToValueAtTime(200, t + 0.15);
    const noiseGain = audioCtx.createGain(); noiseGain.gain.setValueAtTime(0.08, t); noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15); noise.connect(filter); filter.connect(noiseGain); noiseGain.connect(audioCtx.destination); noise.start(t);
    const osc = audioCtx.createOscillator(); const oscGain = audioCtx.createGain(); osc.type = 'triangle'; osc.frequency.setValueAtTime(150, t); osc.frequency.exponentialRampToValueAtTime(40, t + 0.15);
    oscGain.gain.setValueAtTime(0.06, t); oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15); osc.connect(oscGain); oscGain.connect(audioCtx.destination); osc.start(t); osc.stop(t + 0.15);
}

function playSfxMouseFall() {
    if (!audioCtx) return; const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(800, t); osc.frequency.linearRampToValueAtTime(1200, t + 0.1); 
    osc.frequency.exponentialRampToValueAtTime(200, t + 0.5); gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(0.05, t + 0.1); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5); osc.start(t); osc.stop(t + 0.5);
}

function playSfxGameOver() {
    if (!audioCtx) return; const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(500, t); osc.frequency.exponentialRampToValueAtTime(100, t + 0.5); 
    gain.gain.setValueAtTime(0.07, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5); osc.start(t); osc.stop(t + 0.5);
}

// ==========================================
// ★ 화면 리사이징: 모바일 주소창 버그 완벽 대응!
// ==========================================
function resizeGame() {
    // 1. 모바일 실제 시각적 뷰포트 높이 가져오기 (주소창 숨김/표시 완벽 대응)
    let screenHeight = window.innerHeight;
    if (window.visualViewport) {
        screenHeight = window.visualViewport.height;
    }
    
    // 2. 바디 높이를 눈에 보이는 진짜 높이로 강제 고정! (이게 없으면 bottom:0 이 주소창 밑으로 파고듭니다)
    document.body.style.height = screenHeight + 'px';

    const stage = document.getElementById('game-stage');
    const closeBtn = document.getElementById('btn-close-wrap');
    const headerUI = document.querySelector('.header-ui-container');
    
    let scale = Math.min(window.innerWidth / 393, 1);
    let scaledHeight = 852 * scale;
    
    stage.style.left = '50%';
    
    if (screenHeight >= scaledHeight) {
        // 화면이 길 때: 중앙 정렬
        stage.style.top = '50%';
        stage.style.bottom = 'auto';
        stage.style.transform = `translate(-50%, -50%) scale(${scale})`;
        stage.style.transformOrigin = 'center center';
        
        if(closeBtn) closeBtn.style.top = '16px';
        if(headerUI) headerUI.style.top = '75px';
    } else {
        // 화면이 짧을 때: 하단 고정, 상단 크롭, 상단 UI는 5px 여백 유지
        stage.style.top = 'auto';
        stage.style.bottom = '0px';
        stage.style.transform = `translate(-50%, 0) scale(${scale})`;
        stage.style.transformOrigin = 'bottom center';
        
        // 짤려나간 상단 높이(크롭) 계산 후 5px 여백 추가
        let cropVirtualY = 852 - (screenHeight / scale);
        let safeTop = cropVirtualY + 5; 
        
        if(closeBtn) closeBtn.style.top = Math.max(16, safeTop) + 'px';
        if(headerUI) headerUI.style.top = Math.max(75, safeTop + 59) + 'px';
    }
}
window.addEventListener('resize', () => setTimeout(resizeGame, 100)); // 모바일 딜레이 대응
if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', resizeGame);
}
resizeGame();

// ==========================================
// ★ 캔버스 초고화질(DPR) 세팅 및 비율 유지 렌더링
// ==========================================
const dynCanvas = document.getElementById('dynamic-layer-canvas');
const dynCtx = dynCanvas.getContext('2d');

function setupCanvas() {
    const dpr = window.devicePixelRatio || 1;
    dynCanvas.width = 393 * dpr;
    dynCanvas.height = 852 * dpr;
    dynCanvas.style.width = '393px';
    dynCanvas.style.height = '852px';
    dynCtx.scale(dpr, dpr);
    dynCtx.imageSmoothingEnabled = true; 
}
setupCanvas();

function drawImageContain(ctx, img, x, y, boxW, boxH) {
    if(!img.complete || img.width === 0) return;
    let ratio = Math.min(boxW / img.width, boxH / img.height);
    if (ratio > 1) ratio = 1; 
    let newW = img.width * ratio;
    let newH = img.height * ratio;
    let drawX = Math.round(x + (boxW - newW) / 2);
    let drawY = Math.round(y + (boxH - newH) / 2);
    ctx.drawImage(img, drawX, drawY, Math.round(newW), Math.round(newH));
}

const loadedImages = {};
const preloadImages = [
    'effect_damage1.png', 'effect_damage2.png', 'effect_damage3.png',
    'mouse3.png', 'mouse2.png', 'mouse_walk1.png', 'mouse_walk2.png',
    'item_clover.png', 'item_gold.png', 'wood_1.png', 'wood_2.png', 'wood_3.png',
    'block_1.png', 'block_2.png', 'block_3.png', 'pogo_s.png',
    'controller_Default.png', 'controller_pressed.png'
];
preloadImages.forEach(src => { 
    const img = new Image(); 
    img.src = src; 
    loadedImages[src] = img; 
});

const PHYSICS = { gravity: 0.81, jumpPower: -18.9, superJumpPower: -45, moveSpeed: 7, motionHold: 10 };
const PLATFORM_TYPES = { wood: ['wood_1.png', 'wood_2.png', 'wood_3.png'], block: ['block_1.png', 'block_2.png', 'block_3.png'] };
const SIZES = [138, 98, 58];

let isPlaying = false, isSuperJumping = false, isGameOver = false;
let currentY = 0, velocityY = 0, posX = 0, score = 0, cloverCount = 0, bgScrollY = 0;
let maxReachY = 0;
let riveInstance, keys = {}, currentScale = 1, platforms = [], woodParticles = [], motionTimer = 0, lastLoadedFile = "", mouseAnimFrame = 0;

let lastTime = performance.now();
const FPS = 60;
const fpsInterval = 1000 / FPS;
let accumulator = 0;

let mainRive;

let introRive = new rive.Rive({
    src: 'kongsik_intro.riv',
    canvas: document.getElementById('intro-canvas'),
    autoplay: true,
    onLoad: () => introRive.resizeDrawingSurfaceToCanvas(),
    onStop: () => skipIntro(), 
    onLoop: () => skipIntro()  
});

function skipIntro() {
    const introScreen = document.getElementById('intro-screen');
    if (introScreen.style.opacity === '0') return; 

    introScreen.style.pointerEvents = 'none';
    introScreen.style.opacity = '0';
    
    document.getElementById('main-screen').style.display = 'block';
    
    mainRive = new rive.Rive({
        src: 'kongsik.riv',
        canvas: document.getElementById('main-canvas'),
        autoplay: true,
        stateMachines: 'State Machine 1',
        onLoad: () => mainRive.resizeDrawingSurfaceToCanvas()
    });

    setTimeout(() => {
        introScreen.style.display = 'none';
        if (introRive) { introRive.cleanup(); }
    }, 300);
}

// ==========================================
// ★ 최적화된 최신 터치 우선(Latest-Win) 스택 알고리즘 ★
// ==========================================
let touchOrder = []; 
let activeTouches = { left: false, right: false };
let kbdState = { left: false, right: false };
let mouseState = { left: false, right: false };

function syncInput() {
    keys['ArrowLeft'] = kbdState.left || activeTouches.left || mouseState.left;
    keys['ArrowRight'] = kbdState.right || activeTouches.right || mouseState.right;

    if (keys['ArrowLeft']) document.getElementById('btn-left').classList.add('ctrl-pressed');
    else document.getElementById('btn-left').classList.remove('ctrl-pressed');

    if (keys['ArrowRight']) document.getElementById('btn-right').classList.add('ctrl-pressed');
    else document.getElementById('btn-right').classList.remove('ctrl-pressed');
}

function handleTouchChange(e) {
    if (e) e.preventDefault();
    if (isGameOver || !isPlaying) {
        touchOrder = [];
        activeTouches.left = false;
        activeTouches.right = false;
        syncInput();
        return;
    }

    const rect = touchZone.getBoundingClientRect();
    const mid = rect.width / 2;
    let currentLeft = false;
    let currentRight = false;

    for (let i = 0; i < e.touches.length; i++) {
        if (e.touches[i].clientX - rect.left < mid) currentLeft = true;
        else currentRight = true;
    }

    if (!currentLeft) touchOrder = touchOrder.filter(d => d !== 'left');
    if (!currentRight) touchOrder = touchOrder.filter(d => d !== 'right');

    if (currentLeft && !touchOrder.includes('left')) touchOrder.push('left');
    if (currentRight && !touchOrder.includes('right')) touchOrder.push('right');

    activeTouches.left = false;
    activeTouches.right = false;
    if (touchOrder.length > 0) {
        activeTouches[touchOrder[touchOrder.length - 1]] = true;
    }

    syncInput();
}

const touchZone = document.getElementById('touch-zone');
touchZone.addEventListener('touchstart', handleTouchChange, {passive: false});
touchZone.addEventListener('touchmove', handleTouchChange, {passive: false});
touchZone.addEventListener('touchend', handleTouchChange, {passive: false});
touchZone.addEventListener('touchcancel', handleTouchChange, {passive: false});

let isMouseDown = false;
function handleMouse(e, isDown) {
    if (!isDown) {
        mouseState.left = false;
        mouseState.right = false;
    } else {
        if (isGameOver || !isPlaying) return;
        const rect = touchZone.getBoundingClientRect();
        if (e.clientX - rect.left < rect.width / 2) {
            mouseState.left = true;
            mouseState.right = false;
        } else {
            mouseState.left = false;
            mouseState.right = true;
        }
    }
    syncInput();
}
touchZone.addEventListener('mousedown', (e) => { isMouseDown = true; handleMouse(e, true); });
touchZone.addEventListener('mousemove', (e) => { if (isMouseDown) handleMouse(e, true); });
touchZone.addEventListener('mouseup', (e) => { isMouseDown = false; handleMouse(e, false); });
touchZone.addEventListener('mouseleave', (e) => { isMouseDown = false; handleMouse(e, false); });

window.addEventListener('keydown', (e) => { 
    if(isGameOver) return;
    if (e.code === 'ArrowLeft') kbdState.left = true;
    if (e.code === 'ArrowRight') kbdState.right = true;
    syncInput();
});
window.addEventListener('keyup', (e) => { 
    if (e.code === 'ArrowLeft') kbdState.left = false;
    if (e.code === 'ArrowRight') kbdState.right = false;
    syncInput();
});

function resetInputState() {
    keys = {};
    touchOrder = [];
    activeTouches = { left: false, right: false };
    kbdState = { left: false, right: false };
    mouseState = { left: false, right: false };
    syncInput();
}

function startGame() {
    initAudio();
    document.getElementById('main-screen').style.display = 'none';
    document.getElementById('ingame-ui').style.display = 'block';
    document.getElementById('canvas-container').style.display = 'block';
    document.getElementById('touch-zone').style.display = 'block'; 
    document.querySelectorAll('.controller').forEach(el => el.style.display = 'block');
    document.getElementById('game-stage').style.backgroundImage = "url('bg_ingame.png')";
    
    isPlaying = true; isGameOver = false;
    resetInputState();
    initPlatforms();
    playSfxJump(); 

    lastTime = performance.now(); 
    accumulator = 0;
    requestAnimationFrame(update);
}

function resetGame() {
    const screen = document.getElementById('result-screen');
    screen.style.display = 'none';
    screen.classList.remove('show');
    
    resetInputState();
    isGameOver = false;
    isPlaying = true;
    isSuperJumping = false;
    lastLoadedFile = "";
    document.getElementById('canvas-container').classList.remove('gold-glow');
    initPlatforms();
    
    lastTime = performance.now(); 
    accumulator = 0;
    requestAnimationFrame(update); 
}

function showResult() {
    if (isGameOver) return; 
    isPlaying = false; 
    isGameOver = true;
    resetInputState();
    
    playSfxGameOver();

    const finalDist = Math.floor(score * 0.01);
    const totalRate = (score * 0.0001) + (cloverCount * 0.1);
    document.getElementById('res-distance').innerText = `${finalDist}m`;
    document.getElementById('res-clover').innerText = `${cloverCount}개`;
    document.getElementById('res-rate-num').innerText = totalRate.toFixed(2);
    const screen = document.getElementById('result-screen');
    screen.style.display = 'block';
    setTimeout(() => screen.classList.add('show'), 10);
}

function loadRive(fileName) {
    if (lastLoadedFile === fileName) return;
    lastLoadedFile = fileName;
    if (riveInstance) riveInstance.cleanup();
    riveInstance = new rive.Rive({ src: fileName, canvas: document.getElementById('canvas'), autoplay: true, stateMachines: 'State Machine 1', onLoad: () => riveInstance.resizeDrawingSurfaceToCanvas() });
}

class WoodParticle {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 12; this.vy = (Math.random() - 0.5) * 12 - 4;
        this.size = 2 + Math.random() * 3; this.rotation = Math.random() * 360;
        this.life = 1.0;
    }
    update() { this.x += this.vx; this.y += this.vy; this.vy += 0.45; this.life -= 0.025; }
}

function createPlatformData(yPos) {
    let distM = Math.floor(score * 0.01);
    const rand = Math.random();
    let sizeIdx = distM < 100 ? Math.floor(rand * 2) : Math.floor(rand * SIZES.length);
    const width = SIZES[sizeIdx];
    let isBreakable = (rand < 0.15 + (Math.min(distM, 500) / 500) * 0.75);
    let moveType = rand < Math.min(0.5, 0.1 + (0.4 * (distM / 500))) ? (distM < 150 ? 'h' : (Math.random() > 0.5 ? 'h' : 'v')) : 'normal';
    
    let speedMulti = distM >= 200 ? Math.min(1.0 + (distM - 200) / 400, 2.5) : 1.0;
    let moveDir = Math.random() > 0.5 ? 1 : -1;
    let speedVar = (1.0 + Math.random() * 1.5) * moveDir * speedMulti;

    let mice = [];
    let mouseProb = distM >= 200 ? 0.35 : 0.2; 
    let canHaveMouse = (width >= 98) && (rand < mouseProb); 
    
    let itemType = (!canHaveMouse && rand > 0.8) ? (Math.random() > 0.8 ? 'gold' : 'clover') : null;

    if (canHaveMouse) {
        mice.push({
            x: Math.random() * (width - 72),
            dir: Math.random() > 0.5 ? 1 : -1,
            speed: (0.7 + Math.random() * 0.6) * speedMulti,
            waitTimer: 0, yOffset: -52, vy: 0, hit: false, hitTimer: 0, stunTimer: 0, fell: false 
        });
    }

    return { 
        x: Math.random() * (393 - width), y: yPos, baseY: yPos, w: width, h: 22, 
        img: PLATFORM_TYPES[isBreakable?'wood':'block'][sizeIdx], 
        isBreakable, mice: mice, 
        item: itemType, itemCollected: false, type: moveType, speed: speedVar, verticalRange: 40 + Math.random() * 40, vPhase: Math.random() * Math.PI * 2, isBroken: false 
    };
}

function initPlatforms() {
    score = 0; cloverCount = 0; currentY = 0; velocityY = 0; posX = 0; woodParticles = []; bgScrollY = 0; maxReachY = 0;
    document.getElementById('score-board').innerText = "0m";
    document.getElementById('rate-board').innerText = "0";
    document.getElementById('game-stage').style.backgroundPositionY = '0px';
    platforms = [];
    
    let lastY = 752; 
    for (let i = 0; i < 9; i++) { lastY -= (90 + Math.random() * 60); platforms.push(createPlatformData(lastY)); }
    platforms.push({ 
        x: 393/2-69, y: 752, baseY: 752, w: 138, h: 22, 
        img: 'block_1.png', isBreakable: false, isBroken: false, 
        type: 'normal', mice: [], item: null, itemCollected: false 
    });
    loadRive('kongsik_ingame_air.riv');
}

function spawnPickupEffect(x, y) {
    const eff = document.createElement('div');
    eff.className = 'pickup-effect';
    eff.style.left = (x - 80) + 'px'; eff.style.top = (y - 40) + 'px';
    document.getElementById('game-stage').appendChild(eff);
    setTimeout(() => { eff.style.transform = 'translateY(-80px)'; eff.style.opacity = '0'; }, 10);
    setTimeout(() => eff.remove(), 800);
}

function update(currentTime) {
    if (!isPlaying) { 
        if(!isGameOver) requestAnimationFrame(update); 
        return; 
    }

    requestAnimationFrame(update);

    if (!currentTime) currentTime = performance.now();
    let deltaTime = currentTime - lastTime;
    lastTime = currentTime;

    if (deltaTime > 100) deltaTime = 100;
    accumulator += deltaTime;

    while (accumulator >= fpsInterval) {
        
        if (keys['ArrowLeft']) { posX -= PHYSICS.moveSpeed; currentScale = -1; }
        if (keys['ArrowRight']) { posX += PHYSICS.moveSpeed; currentScale = 1; }
        
        posX = Math.max(-153, Math.min(153, posX));
        velocityY += isSuperJumping ? PHYSICS.gravity * 0.5 : PHYSICS.gravity;
        currentY += velocityY;
        mouseAnimFrame = (mouseAnimFrame + 1) % 20;
        
        let currentTotalY = -currentY + bgScrollY;
        if (currentTotalY > maxReachY) { maxReachY = currentTotalY; score = maxReachY; document.getElementById('score-board').innerText = Math.floor(score * 0.01) + "m"; }
        if (isSuperJumping && velocityY >= 0) { isSuperJumping = false; document.getElementById('canvas-container').classList.remove('gold-glow'); }
        
        woodParticles.forEach(p => p.update());
        woodParticles = woodParticles.filter(p => p.life > 0);
        
        const charFootY = 752 + currentY, charLeft = 393/2 + posX - 25; 
        
        platforms.forEach(p => {
            p.mice.forEach(m => {
                if (m.hitTimer > 0) m.hitTimer--; 
                if (m.stunTimer > 0) { m.stunTimer--; if (m.stunTimer <= 0) m.hit = false; }
                
                if (!p.isBroken) {
                    if (m.waitTimer > 0) m.waitTimer--;
                    else { 
                        if(!m.hit) { 
                            m.x += m.dir * m.speed; 
                            if (m.x <= 0 || m.x + 72 >= p.w) { m.dir *= -1; m.waitTimer = 30; } 
                        } 
                    }
                    let mx = p.x + m.x, my = p.y - 35;
                    
                    if (!isSuperJumping && velocityY > 0 && charLeft + 35 > mx + 28 && charLeft + 15 < mx + 44 && charFootY > my + 10 && charFootY < my + 35) { 
                        playSfxHit();
                        velocityY = -15; 
                        let playerCenterX = charLeft + 25; 
                        let ratCenterX = mx + 36;          
                        if (playerCenterX < ratCenterX) posX -= 100; else posX += 100; 
                        m.hit = true; m.hitTimer = 15; m.stunTimer = 60; 
                    }
                } else { 
                    if (!m.fell) {
                        playSfxMouseFall();
                        m.fell = true;
                    }
                    m.vy += 0.6; m.yOffset += m.vy; 
                }
            });

            if (!p.isBroken) {
                if (p.type === 'h') { p.x += p.speed; if (p.x <= 0 || p.x + p.w >= 393) p.speed *= -1; } 
                else if (p.type === 'v') { p.vPhase += 0.03; p.y = p.baseY + Math.sin(p.vPhase) * p.verticalRange; }
                if (p.item && !p.itemCollected) {
                    let ix = p.x + p.w/2 - 25, iy = p.y - 55;
                    if (charLeft + 45 > ix && charLeft + 5 < ix + 50 && charFootY > iy && charFootY < iy + 50) {
                        p.itemCollected = true;
                        if (p.item === 'clover') { 
                            playSfxClover();
                            cloverCount++; document.getElementById('rate-board').innerText = `${cloverCount}`; spawnPickupEffect(ix + 25, iy); 
                        } 
                        else if (p.item === 'gold') { 
                            playSfxSuperJump();
                            isSuperJumping = true; velocityY = PHYSICS.superJumpPower; document.getElementById('canvas-container').classList.add('gold-glow'); loadRive('kongsik_ingame_air.riv'); 
                        }
                    }
                }
                if (!isSuperJumping && velocityY > 0 && charLeft + 45 > p.x && charLeft + 5 < p.x + p.w && charFootY >= p.y && charFootY <= p.y + 15) { 
                    playSfxJump();
                    loadRive('kongsik_ingame_land.riv'); velocityY = PHYSICS.jumpPower; currentY = p.y - 752; motionTimer = PHYSICS.motionHold; 
                    if (p.isBreakable) { 
                        p.isBroken = true; 
                        playSfxBreak(); 
                        for(let i=0; i<15; i++) woodParticles.push(new WoodParticle(p.x + p.w/2, p.y)); 
                    }
                }
            }
        });

        if (motionTimer > 0) { motionTimer--; if (motionTimer === 1) loadRive('kongsik_ingame_air.riv'); }
        if (currentY < -250) {
            let diff = -250 - currentY; currentY = -250; bgScrollY += diff; 
            
            document.getElementById('game-stage').style.backgroundPositionY = (bgScrollY % 852) + 'px'; 
            
            let distM = Math.floor(score * 0.01);
            let extraGap = distM >= 200 ? Math.min((distM - 200) * 0.5, 80) : 0;

            platforms.forEach(p => { 
                p.y += diff; p.baseY += diff; 
                if (p.y > 852 && p.baseY > 852) { 
                    let topY = Math.min(...platforms.map(pl => pl.y)); 
                    let newGap = 90 + extraGap + Math.random() * 60;
                    Object.assign(p, createPlatformData(topY - newGap)); 
                    p.isBroken = false; 
                } 
            });
            woodParticles.forEach(p => p.y += diff);
        }
        
        if (charFootY > 1050) showResult(); 

        accumulator -= fpsInterval;
    }

    if (isPlaying && !isGameOver) {
        document.getElementById('canvas-container').style.transform = `translate(${posX}px, ${currentY}px) scaleX(${currentScale})`;
        
        dynCtx.clearRect(0, 0, 393, 852);
        
        woodParticles.forEach(p => { 
            dynCtx.fillStyle = `rgba(161, 136, 127, ${p.life})`;
            dynCtx.fillRect(p.x, p.y, p.size, p.size);
        });
        
        platforms.forEach(p => {
            if (!p.isBroken) {
                let pImg = loadedImages[p.img];
                if(pImg) dynCtx.drawImage(pImg, p.x, p.y, p.w, 22); 
                
                if (p.item && !p.itemCollected) { 
                    let iImg = loadedImages[`item_${p.item}.png`];
                    if(iImg) drawImageContain(dynCtx, iImg, p.x + p.w/2 - 25, p.y - 55, 50, 50);
                }
            }
            p.mice.forEach(m => {
                if (m.hit && m.hitTimer > 0) {
                    let effImgName = m.hitTimer > 10 ? 'effect_damage1.png' : (m.hitTimer > 5 ? 'effect_damage2.png' : 'effect_damage3.png');
                    let effImg = loadedImages[effImgName];
                    if(effImg) drawImageContain(dynCtx, effImg, p.x + m.x + 6, p.y + m.yOffset - 10, 60, 60);
                }
                
                let mouseImgName = m.hit ? 'mouse3.png' : (m.waitTimer > 0 || p.isBroken ? 'mouse2.png' : `mouse_walk${mouseAnimFrame < 10 ? 1 : 2}.png`);
                let mImg = loadedImages[mouseImgName];
                if(mImg) {
                    dynCtx.save();
                    dynCtx.translate(Math.round(p.x + m.x + 36), Math.round(p.y + m.yOffset + 27)); 
                    dynCtx.scale(m.dir, 1);
                    drawImageContain(dynCtx, mImg, -36, -27, 72, 54);
                    dynCtx.restore();
                }
            });
        });
    }
}
</script>
